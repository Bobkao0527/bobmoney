<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的雲端記帳本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 使用 Chart.js 庫 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-loading { pointer-events: none; opacity: 0.7; }
        .collapse-content { transition: max-height 0.3s ease-out, opacity 0.3s ease-out; overflow: hidden; }
        .collapse-closed { max-height: 0; opacity: 0; pointer-events: none; }
        .collapse-open { max-height: 2000px; opacity: 1; }
        .rotate-180 { transform: rotate(180deg); }
        .tab-active { background-color: #3b82f6; color: white; }
        #balance-card { transition: background-color 0.8s ease; }
        
        canvas { max-width: 100% !important; height: auto !important; }
    </style>
</head>
<body class="p-4 md:p-8 text-gray-800">

    <div class="max-w-4xl mx-auto">
        <!-- 頂部標題與刷新按鈕 -->
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i data-lucide="wallet" class="text-blue-600"></i> Bob帳務系統
            </h1>
            <button onclick="fetchData()" class="p-2 bg-white rounded-full shadow hover:bg-gray-100 transition-colors">
                <i data-lucide="refresh-cw" class="w-5 h-5 text-gray-600"></i>
            </button>
        </header>

        <!-- 目前總餘額 -->
        <section class="mb-10 text-center">
            <div id="balance-card" class="card p-8 bg-slate-800 text-white inline-block min-w-full md:min-w-[400px] shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-sm opacity-90 mb-2 tracking-widest uppercase font-bold drop-shadow-md">目前總餘額</p>
                    <p id="grand-balance" class="text-5xl font-bold font-mono tracking-tight drop-shadow-lg">$ 0</p>
                </div>
                <div class="absolute -right-4 -bottom-4 opacity-10">
                    <i data-lucide="piggy-bank" class="w-32 h-32"></i>
                </div>
            </div>
        </section>

        <hr class="mb-8 border-gray-300">

        <!-- 區間篩選與統計 -->
        <section class="mb-8">
            <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4 mb-4">
                <div class="flex bg-gray-200 p-1 rounded-xl w-full md:w-auto">
                    <button onclick="changeView('day')" id="tab-day" class="flex-1 px-4 py-2 text-xs font-bold rounded-lg transition-all">日</button>
                    <button onclick="changeView('month')" id="tab-month" class="flex-1 px-4 py-2 text-xs font-bold rounded-lg tab-active transition-all">月</button>
                    <button onclick="changeView('year')" id="tab-year" class="flex-1 px-4 py-2 text-xs font-bold rounded-lg transition-all">年</button>
                    <button onclick="changeView('all')" id="tab-all" class="flex-1 px-4 py-2 text-xs font-bold rounded-lg transition-all">全</button>
                </div>
                <div class="text-xs text-gray-500 font-medium italic">
                    正在查看：<span id="view-indicator" class="text-blue-600">本月</span> 統計與圖表
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="card p-3 border-t-2 border-green-500 text-center">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">期間收入</p>
                    <p id="total-income" class="text-sm md:text-lg font-bold text-green-600">$ 0</p>
                </div>
                <div class="card p-3 border-t-2 border-red-500 text-center">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">期間支出</p>
                    <p id="total-expense" class="text-sm md:text-lg font-bold text-red-600">$ 0</p>
                </div>
                <div class="card p-3 border-t-2 border-blue-500 text-center">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">期間小計</p>
                    <p id="balance" class="text-sm md:text-lg font-bold text-blue-600">$ 0</p>
                </div>
            </div>
        </section>

        <!-- 圖表分析區塊 -->
        <section class="mb-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 支出比例 (Pie Chart) -->
                <div class="card p-6 flex flex-col h-[350px]">
                    <h3 class="text-sm font-bold mb-4 flex items-center gap-2 text-gray-600">
                        <i data-lucide="pie-chart" class="w-4 h-4 text-purple-500"></i> 支出比例分佈
                    </h3>
                    <div class="flex-1 relative">
                        <canvas id="pieChart"></canvas>
                    </div>
                </div>
                <!-- 趨勢分析 (Bar + MA Line) -->
                <div class="card p-6 flex flex-col h-[350px]">
                    <h3 class="text-sm font-bold mb-4 flex items-center gap-2 text-gray-600">
                        <i data-lucide="trending-up" class="w-4 h-4 text-orange-500"></i> <span id="trend-title">支出趨勢</span>
                    </h3>
                    <div class="flex-1 relative">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
            <!-- 餘額瀑布圖 (Waterfall Chart) -->
            <div class="card p-6 flex flex-col h-[400px]">
                <h3 class="text-sm font-bold mb-4 flex items-center gap-2 text-gray-600">
                    <i data-lucide="bar-chart-3" class="w-4 h-4 text-green-600"></i> 資金餘額瀑布圖 (全歷史數據)
                </h3>
                <div class="flex-1 relative">
                    <canvas id="waterfallChart"></canvas>
                </div>
            </div>
        </section>

        <!-- 記帳表單 -->
        <section class="card p-6 mb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-gray-700">
                <i data-lucide="plus-circle" class="w-5 h-5 text-blue-500"></i> 新增紀錄
            </h2>
            <form id="record-form" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
                <div>
                    <label class="block text-sm font-medium text-gray-700">類型</label>
                    <div class="mt-2 flex gap-4 p-2 bg-gray-50 rounded-md border border-gray-200">
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="radio" name="type" value="expense" checked onchange="updateCategoryOptions()" class="text-red-600 focus:ring-red-500">
                            <span class="ml-2 text-red-600 font-medium text-sm">支出</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="radio" name="type" value="income" onchange="updateCategoryOptions()" class="text-green-600 focus:ring-green-500">
                            <span class="ml-2 text-green-600 font-medium text-sm">收入</span>
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">類別</label>
                    <select id="category" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border bg-white text-sm">
                        <option value="">載入中...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">項目</label>
                    <input type="text" id="item" placeholder="內容項目" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">金額</label>
                    <input type="number" id="amount" placeholder="金額" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border text-sm" required>
                </div>
                
                <div class="lg:col-span-4 flex justify-between items-center gap-4 mt-2">
                    <div id="submit-status" class="text-xs font-medium"></div>
                    <button type="submit" id="submit-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg transition-colors flex items-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> 儲存紀錄
                    </button>
                </div>
            </form>
        </section>

        <!-- 最近紀錄 -->
        <section class="card overflow-hidden">
            <button onclick="toggleHistory()" class="w-full p-6 flex justify-between items-center hover:bg-gray-50 transition-colors focus:outline-none">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <i data-lucide="list" class="w-5 h-5"></i> 最近紀錄 (前 50 筆)
                </h2>
                <i id="chevron-icon" data-lucide="chevron-down" class="transition-transform duration-300 rotate-180"></i>
            </button>
            
            <div id="history-content" class="collapse-content collapse-closed">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-t border-gray-100">
                        <thead class="bg-gray-50 border-b text-[10px] uppercase tracking-wider text-gray-500">
                            <tr>
                                <th class="px-6 py-3 font-bold">時間</th>
                                <th class="px-6 py-3 font-bold">類別</th>
                                <th class="px-6 py-3 font-bold">項目</th>
                                <th class="px-6 py-3 font-bold text-right">支出</th>
                                <th class="px-6 py-3 font-bold text-right">收入</th>
                            </tr>
                        </thead>
                        <tbody id="data-table-body" class="divide-y divide-gray-200 text-sm">
                            <!-- 資料將由 JS 填入 -->
                        </tbody>
                    </table>
                </div>
                <div id="loading" class="p-10 text-center text-gray-400 text-sm italic">
                    正在同步雲端資料...
                </div>
            </div>
        </section>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIP8cEecVXdOM4QJvjQNsyLXvvPd260IBTeJwtiAweiBJnMeB8rmbHhmMaWIs8bU9AF1VccA6x3q_2/pub?output=csv';
        // 已更新為新的 Web App 網址
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbwx60KulJZs0v7QSIzNKb7-oAXFxNMlh5TT2maeCc2Ur-czliwwlFUP4LmCVUzzK2Y/exec'; 
        const API_KEY = 'YOUR_SECRET_KEY_HERE';

        let categories = { expense: [], income: [] };
        let allRecords = [];
        let currentView = 'month'; 
        
        let pieChart = null;
        let trendChart = null;
        let waterfallChart = null;

        lucide.createIcons();

        function parseCustomDate(str) {
            if (!str || str.length < 8) return null;
            try {
                const year = parseInt(str.substring(0, 4));
                const month = parseInt(str.substring(4, 6)) - 1;
                const day = parseInt(str.substring(6, 8));
                let hour = 0;
                let min = 0;
                if (str.includes('-')) {
                    const timePart = str.split('-')[1];
                    hour = parseInt(timePart.substring(0, 2)) || 0;
                    min = parseInt(timePart.substring(2, 4)) || 0;
                }
                return new Date(year, month, day, hour, min);
            } catch (e) { return null; }
        }

        function formatCustomDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const hh = String(date.getHours()).padStart(2, '0');
            const mm = String(date.getMinutes()).padStart(2, '0');
            return `${y}${m}${d}-${hh}${mm}`;
        }

        function getSecureLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('瀏覽器不支援定位'));
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (position) => resolve({ lat: position.coords.latitude, lng: position.coords.longitude }),
                    (error) => reject(error),
                    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
                );
            });
        }

        function changeView(view) {
            currentView = view;
            ['day', 'month', 'year', 'all'].forEach(v => {
                const btn = document.getElementById(`tab-${v}`);
                if (btn) btn.classList.remove('tab-active');
            });
            document.getElementById(`tab-${view}`).classList.add('tab-active');
            
            const labels = { day: '今日', month: '本月', year: '今年', all: '累計' };
            document.getElementById('view-indicator').innerText = labels[view];

            calculateStats();
            updateCharts();
        }

        function toggleHistory() {
            const content = document.getElementById('history-content');
            const icon = document.getElementById('chevron-icon');
            if (content.classList.contains('collapse-open')) {
                content.classList.replace('collapse-open', 'collapse-closed');
                icon.classList.add('rotate-180');
            } else {
                content.classList.replace('collapse-closed', 'collapse-open');
                icon.classList.remove('rotate-180');
            }
        }

        async function fetchData() {
            const loading = document.getElementById('loading');
            loading.classList.remove('hidden');

            try {
                const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
                const csvText = await response.text();
                
                Papa.parse(csvText, {
                    header: false,
                    skipEmptyLines: true,
                    complete: function(results) {
                        const rawData = results.data;
                        
                        let expSet = new Set();
                        let incSet = new Set();
                        rawData.forEach((row, idx) => {
                            if (idx === 0) return;
                            if (row[10]?.trim()) expSet.add(row[10].trim());
                            if (row[11]?.trim()) incSet.add(row[11].trim());
                        });
                        categories.expense = Array.from(expSet);
                        categories.income = Array.from(incSet);
                        updateCategoryOptions();

                        allRecords = rawData.slice(1).map(row => {
                            const dateObj = parseCustomDate(row[0]);
                            return {
                                time: row[0],
                                dateObj: dateObj,
                                category: row[1],
                                item: row[2],
                                expense: parseFloat(row[3]) || 0,
                                income: parseFloat(row[4]) || 0
                            };
                        }).filter(r => r.time).sort((a,b) => a.dateObj - b.dateObj);

                        calculateStats();
                        renderTable();
                        updateCharts();
                    }
                });
            } catch (error) {
                console.error('讀取失敗:', error);
                loading.innerText = '載入失敗，請檢查網路連線。';
            }
        }

        function calculateStats() {
            const now = new Date(); 
            let viewIn = 0;
            let viewOut = 0;
            let grandTotalIn = 0;
            let grandTotalOut = 0;

            allRecords.forEach(r => {
                if (!r.dateObj) return;

                grandTotalIn += r.income;
                grandTotalOut += r.expense;
                
                let match = false;
                const rDate = r.dateObj;

                switch(currentView) {
                    case 'day':
                        match = rDate.getFullYear() === now.getFullYear() && 
                                rDate.getMonth() === now.getMonth() && 
                                rDate.getDate() === now.getDate();
                        break;
                    case 'month':
                        match = rDate.getMonth() === now.getMonth() && 
                                rDate.getFullYear() === now.getFullYear();
                        break;
                    case 'year':
                        match = rDate.getFullYear() === now.getFullYear();
                        break;
                    case 'all':
                        match = true;
                        break;
                }

                if (match) {
                    viewIn += r.income;
                    viewOut += r.expense;
                }
            });

            const currentGrandBalance = grandTotalIn - grandTotalOut;
            
            // 更新 UI 數字
            document.getElementById('total-income').innerText = `$ ${viewIn.toLocaleString()}`;
            document.getElementById('total-expense').innerText = `$ ${viewOut.toLocaleString()}`;
            const viewNet = viewIn - viewOut;
            document.getElementById('balance').innerText = `$ ${viewNet.toLocaleString()}`;
            document.getElementById('balance').className = `text-sm md:text-lg font-bold ${viewNet >= 0 ? 'text-blue-600' : 'text-orange-600'}`;
            document.getElementById('grand-balance').innerText = `$ ${currentGrandBalance.toLocaleString()}`;

            // 動態背景色邏輯：固定數值範圍
            // < 300: 紅色 (HSL 0)
            // > 800: 綠色 (HSL 140)
            // 300 ~ 800: 線性漸變
            const card = document.getElementById('balance-card');
            
            let h = 0;
            if (currentGrandBalance <= 300) {
                h = 0; // 紅色
            } else if (currentGrandBalance >= 800) {
                h = 140; // 綠色
            } else {
                // 在 300 和 800 之間計算比例 (0.0 ~ 1.0)
                const ratio = (currentGrandBalance - 300) / (800 - 300);
                h = Math.round(ratio * 140);
            }
            
            const s = 65; // 飽和度
            const l = 40; // 亮度 (深色質感)
            card.style.backgroundColor = `hsl(${h}, ${s}%, ${l}%)`;
        }

        function updateCharts() {
            const now = new Date();
            const filtered = allRecords.filter(r => {
                const rDate = r.dateObj;
                if (!rDate) return false;
                if (currentView === 'day') return rDate.toDateString() === now.toDateString();
                if (currentView === 'month') return rDate.getMonth() === now.getMonth() && rDate.getFullYear() === now.getFullYear();
                if (currentView === 'year') return rDate.getFullYear() === now.getFullYear();
                return true;
            });

            updatePieChart(filtered);
            updateTrendChart(filtered);
            updateWaterfallChart(allRecords); 
        }

        function updatePieChart(data) {
            const expenseOnly = data.filter(r => r.expense > 0);
            const catMap = {};
            expenseOnly.forEach(r => {
                catMap[r.category] = (catMap[r.category] || 0) + r.expense;
            });

            const labels = Object.keys(catMap);
            const values = Object.values(catMap);

            const ctx = document.getElementById('pieChart').getContext('2d');
            if (pieChart) pieChart.destroy();
            
            if (labels.length === 0) {
                ctx.save();
                ctx.font = "14px Arial";
                ctx.textAlign = "center";
                ctx.fillText("尚無支出數據", ctx.canvas.width/2, ctx.canvas.height/2);
                ctx.restore();
                return;
            }

            pieChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#ef4444', '#3b82f6', '#f59e0b', '#10b981', '#8b5cf6', '#ec4899', '#64748b']
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } }
                }
            });
        }

        function calculateMA(data, period) {
            let result = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    result.push(null);
                    continue;
                }
                let sum = 0;
                for (let j = 0; j < period; j++) {
                    sum += data[i - j];
                }
                result.push(sum / period);
            }
            return result;
        }

        function updateTrendChart(data) {
            const groupMap = {};
            let mode = 'day'; 
            let title = '支出趨勢 (單位：日)';

            if (currentView === 'day') {
                mode = 'hour';
                title = '今日支出分佈 (單位：小時)';
                for(let i=0; i<24; i++) groupMap[`${String(i).padStart(2, '0')}:00`] = 0;
            } else if (currentView === 'year') {
                mode = 'month';
                title = '年度支出趨勢 (單位：月)';
            }

            document.getElementById('trend-title').innerText = title;
            const dataSource = (currentView === 'all') ? allRecords : data;

            dataSource.forEach(r => {
                if (!r.dateObj) return;
                let key;
                if (mode === 'hour') {
                    key = `${String(r.dateObj.getHours()).padStart(2, '0')}:00`;
                } else if (mode === 'month') {
                    key = `${r.dateObj.getFullYear()}/${String(r.dateObj.getMonth() + 1).padStart(2, '0')}`;
                } else {
                    key = `${r.dateObj.getFullYear()}/${r.dateObj.getMonth() + 1}/${r.dateObj.getDate()}`;
                }
                groupMap[key] = (groupMap[key] || 0) + r.expense;
            });

            const labels = Object.keys(groupMap).sort((a, b) => {
                if (mode === 'hour') return parseInt(a) - parseInt(b);
                return new Date(a) - new Date(b);
            });
            const values = labels.map(l => groupMap[l]);

            const showMA = (mode !== 'hour');
            const ma5 = showMA ? calculateMA(values, 5) : [];
            const ma10 = showMA ? calculateMA(values, 10) : [];

            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChart) trendChart.destroy();

            const datasets = [
                { 
                    label: '支出金額', 
                    data: values, 
                    backgroundColor: mode === 'hour' ? 'rgba(139, 92, 246, 0.6)' : 'rgba(59, 130, 246, 0.4)', 
                    borderRadius: 4 
                }
            ];

            if (showMA) {
                datasets.push({ label: 'MA5', data: ma5, type: 'line', borderColor: '#ef4444', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.3 });
                datasets.push({ label: 'MA10', data: ma10, type: 'line', borderColor: '#f59e0b', borderWidth: 1.5, pointRadius: 0, fill: false, tension: 0.3 });
            }

            trendChart = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } }
                    },
                    scales: { 
                        y: { beginAtZero: true, ticks: { font: { size: 9 } } }, 
                        x: { 
                            ticks: { 
                                font: { size: 9 },
                                autoSkip: true, 
                                maxTicksLimit: 12 
                            } 
                        } 
                    }
                }
            });
        }

        function updateWaterfallChart(data) {
            if (data.length === 0) return;

            const labels = ['初始'];
            const waterfallData = [[0, 0]]; 
            const colors = ['#64748b']; 
            
            let runningBalance = 0;
            const historyValues = [0];

            data.forEach((r, idx) => {
                const diff = r.income - r.expense;
                const start = runningBalance;
                runningBalance += diff;
                
                labels.push(`${r.dateObj.getMonth()+1}/${r.dateObj.getDate()} ${r.item}`);
                waterfallData.push([start, runningBalance]);
                colors.push(diff >= 0 ? '#22c55e' : '#ef4444');
                historyValues.push(runningBalance);
            });

            labels.push('目前結餘');
            waterfallData.push([0, runningBalance]);
            colors.push('#3b82f6');
            historyValues.push(runningBalance);

            const maxV = Math.max(...historyValues);
            const minV = Math.min(...historyValues);
            const avgV = historyValues.reduce((a,b) => a+b, 0) / historyValues.length;

            const ctx = document.getElementById('waterfallChart').getContext('2d');
            if (waterfallChart) waterfallChart.destroy();

            waterfallChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '餘額變動',
                        data: waterfallData,
                        backgroundColor: colors,
                        borderWidth: 0,
                        barPercentage: 0.9,
                        categoryPercentage: 0.9
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    const val = context.raw;
                                    const diff = val[1] - val[0];
                                    return `變動: ${diff > 0 ? '+' : ''}${diff.toLocaleString()} (餘額: ${val[1].toLocaleString()})`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { font: { size: 9 } },
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        },
                        x: { display: false }
                    }
                },
                plugins: [{
                    id: 'thresholdLines',
                    afterDraw: (chart) => {
                        const { ctx, chartArea: { left, right }, scales: { y } } = chart;
                        ctx.save();
                        
                        const drawLine = (val, color, label) => {
                            const yPos = y.getPixelForValue(val);
                            ctx.strokeStyle = color;
                            ctx.setLineDash([5, 5]);
                            ctx.lineWidth = 1;
                            ctx.beginPath();
                            ctx.moveTo(left, yPos);
                            ctx.lineTo(right, yPos);
                            ctx.stroke();
                            
                            ctx.fillStyle = color;
                            ctx.font = 'bold 10px sans-serif';
                            ctx.fillText(`${label}: ${Math.round(val).toLocaleString()}`, right - 70, yPos - 5);
                        };

                        drawLine(maxV, 'rgba(34, 197, 94, 0.6)', 'MAX');
                        drawLine(minV, 'rgba(239, 68, 68, 0.6)', 'MIN');
                        drawLine(avgV, 'rgba(100, 116, 139, 0.6)', 'AVG');
                        
                        ctx.restore();
                    }
                }]
            });
        }

        function renderTable() {
            const tbody = document.getElementById('data-table-body');
            document.getElementById('loading').classList.add('hidden');
            tbody.innerHTML = '';

            const displayData = [...allRecords].reverse().slice(0, 50);

            displayData.forEach(row => {
                let displayTime = row.time;
                if (row.time && row.time.length >= 8) {
                    const y = row.time.substring(0, 4);
                    const m = row.time.substring(4, 6);
                    const d = row.time.substring(6, 8);
                    let t = "";
                    if (row.time.includes('-')) {
                        const parts = row.time.split('-');
                        const hh = parts[1].substring(0, 2);
                        const mm = parts[1].substring(2, 4);
                        t = ` ${hh}:${mm}`;
                    }
                    displayTime = `${y}/${m}/${d}${t}`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 text-gray-500 text-[11px] font-mono whitespace-nowrap">${displayTime}</td>
                    <td class="px-6 py-4 font-medium text-gray-700">${row.category || '-'}</td>
                    <td class="px-6 py-4 text-gray-600">${row.item || '-'}</td>
                    <td class="px-6 py-4 text-right text-red-600 font-bold">${row.expense > 0 ? '$' + row.expense.toLocaleString() : ''}</td>
                    <td class="px-6 py-4 text-right text-green-600 font-bold">${row.income > 0 ? '$' + row.income.toLocaleString() : ''}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateCategoryOptions() {
            const type = document.querySelector('input[name="type"]:checked').value;
            const select = document.getElementById('category');
            const options = categories[type] || [];
            select.innerHTML = options.map(cat => `<option value="${cat}">${cat}</option>`).join('');
            if (options.length === 0) select.innerHTML = '<option value="">無類別資料</option>';
        }

        document.getElementById('record-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const status = document.getElementById('submit-status');
            
            btn.classList.add('btn-loading');
            status.innerText = 'GPS 驗證中...';
            status.className = 'text-xs text-amber-600';

            let loc;
            try {
                loc = await getSecureLocation();
            } catch (error) {
                status.innerText = '儲存失敗：需開啟定位。';
                status.className = 'text-xs text-red-600';
                btn.classList.remove('btn-loading');
                return;
            }

            status.innerText = '傳送中...';
            const type = document.querySelector('input[name="type"]:checked').value;
            const amount = document.getElementById('amount').value;
            
            const payload = {
                key: API_KEY,
                timestamp: formatCustomDate(new Date()), 
                category: document.getElementById('category').value,
                item: document.getElementById('item').value,
                expense: type === 'expense' ? amount : 0,
                income: type === 'income' ? amount : 0,
                lat: loc.lat,
                lng: loc.lng
            };

            try {
                // 傳送到新網址
                await fetch(GAS_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                status.innerText = '儲存成功！';
                status.className = 'text-xs text-green-600';
                document.getElementById('item').value = '';
                document.getElementById('amount').value = '';
                setTimeout(() => { fetchData(); status.innerText = ''; btn.classList.remove('btn-loading'); }, 1500);
            } catch (err) {
                status.innerText = '同步失敗。';
                status.className = 'text-xs text-red-600';
                btn.classList.remove('btn-loading');
            }
        };

        window.onload = fetchData;
    </script>
</body>
</html>
